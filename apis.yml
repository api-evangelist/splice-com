aid: splice-com
name: Splice
description: >-
  Splice is a New York-based music creation platform serving producers,
  songwriters, and audio creators. Its core offerings are Splice Sounds, a
  catalog of millions of 100% royalty-free samples, one-shots, loops, MIDI
  patterns, and presets sold through a credit-based subscription; Splice
  INSTRUMENT, a creator-first virtual instrument with monthly free drops and
  unlimited premium presets via subscription; and a Rent-to-Own Plugins
  marketplace offering pay-as-you-go full-license access to 130+ professional
  VST/AU/AAX plugins from third-party vendors such as Xfer (Serum 2),
  Arturia (V Collection 11 Pro), Spitfire Audio (Abbey Road Two), and
  XLN Audio (RC-20). Splice ships a desktop app, a mobile app, the Splice
  Sounds Plugin (beta) for in-DAW browsing, and native integrations for
  Ableton Live 12.3+, Studio One Pro 7, Studio Pro 8+, and Pro Tools
  2025.6+. The revenue model is consumer subscriptions (Sounds+ $12.99/mo,
  Creator $19.99/mo with 200 credits, Creator+ $39.99/mo with 500 credits,
  INSTRUMENT $12.99/mo) plus rent-to-own plugin payments. Splice does not
  publish a public developer API, OpenAPI specification, SDK, or partner
  program; its GitHub organization at github.com/splice contains internal
  tooling, GitHub Actions, audio engineering exercises, and forks rather
  than externally consumable APIs.
